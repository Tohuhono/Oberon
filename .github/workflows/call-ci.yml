name: CI

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      repository:
        required: true
        type: string
      ref:
        required: true
        type: string
      base:
        required: true
        type: string
    secrets:
      VERCEL_PROJECT_ID:
        required: true
      VERCEL_API_TOKEN:
        required: true
      VERCEL_ORG_ID:
        required: true
      VERCEL_PROTECTION_BYPASS:
        required: false
      TURSO_URL:
        required: false
      TURSO_TOKEN:
        required: false

permissions:
  actions: read
  contents: read

jobs:
  detect-recovery:
    name: Detect Recovery Deploy
    if: ${{ inputs.environment == 'production' && inputs.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      force_redeploy: ${{ steps.detect.outputs.force_redeploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - name: Check previous production run
        id: detect
        uses: actions/github-script@v9
        with:
          script: |
            const detectRecovery = require('./.github/scripts/detect-recovery.cjs')
            await detectRecovery({ github, context, core })

  changed-packages:
    name: Changed Packages
    uses: ./.github/workflows/call-changed-packages.yml
    with:
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      base: ${{ inputs.base }}

  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      USE_DEVELOPMENT_DATABASE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - name: Corepack
        run: corepack enable pnpm
      - name: Enable pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-validate-${{ github.sha }}
      - name: Install
        run: pnpm i
      - name: Prettier
        run: pnpm prettier
      - name: Check
        run: pnpm check

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      USE_DEVELOPMENT_DATABASE: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - name: Corepack
        run: corepack enable pnpm
      - name: Enable pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-e2e-${{ github.sha }}
      - name: Install
        run: pnpm i
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: E2E Tests
        run: pnpm test:e2e
      - name: Publish Playwright report
        if: ${{ failure() }}
        uses: ./.github/actions/deploy-playwright-report
        with:
          artifact_name: playwright-report
          artifact_path: |
            apps/playground/.playwright/report/**
            apps/playground/.playwright/logs/**
          report_dir: apps/playground/.playwright/report
          summary_label: View report
          vercel_token: ${{ secrets.VERCEL_API_TOKEN }}

  coa:
    name: Create Oberon App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          package-manager-cache: false
      - name: Corepack
        run: corepack enable pnpm
      - name: Enable pnpm cache
        uses: actions/setup-node@v6
        with:
          cache: pnpm
      - name: Cache turbo build setup
        uses: actions/cache@v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-coa-${{ github.sha }}
      - name: Install
        run: pnpm i
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: COA Tests
        run: pnpm test:coa

  deploy_docs:
    name: Oberon Docs
    needs: [changed-packages, detect-recovery]
    if:
      ${{ always() && ((needs.detect-recovery.result == 'success' &&
      needs.detect-recovery.outputs.force_redeploy == 'true') ||
      contains(needs.changed-packages.outputs.changed_packages,
      '@oberon/docs')) }}
    uses: ./.github/workflows/call-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      project: oberon-docs
    secrets:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy_playground:
    name: Oberon Playground
    needs: [changed-packages, detect-recovery]
    if:
      ${{ always() && ((needs.detect-recovery.result == 'success' &&
      needs.detect-recovery.outputs.force_redeploy == 'true') ||
      contains(needs.changed-packages.outputs.changed_packages,
      '@oberon/playground')) }}
    uses: ./.github/workflows/call-deploy.yml
    with:
      environment: ${{ inputs.environment }}
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      project: playground
    secrets:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      TURSO_URL: ${{ secrets.TURSO_URL }}
      TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}

  smoke_docs:
    name: Smoke Test Docs
    needs: [changed-packages, deploy_docs]
    uses: ./.github/workflows/call-smoke.yml
    with:
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      project: docs
      base_url: ${{ needs.deploy_docs.outputs.url }}
    secrets:
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}

  smoke_playground:
    name: Smoke Test Playground
    needs: [changed-packages, deploy_playground]
    uses: ./.github/workflows/call-smoke.yml
    with:
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      project: playground
      base_url: ${{ needs.deploy_playground.outputs.url }}
    secrets:
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}

  test-status:
    name: Test Status
    needs:
      [
        changed-packages,
        validate,
        e2e,
        coa,
        deploy_docs,
        deploy_playground,
        smoke_docs,
        smoke_playground,
      ]
    if: always()
    runs-on: ubuntu-latest
    env:
      STATUS:
        "${{ contains(needs.*.result, 'failure') && 'failed' ||
        contains(needs.*.result, 'cancelled') || 'passed' }}"
      MESSAGE: |
        Latest deployments available at: 
        ${{ needs.deploy_docs.outputs.url && format('[docs]({0}) ', needs.deploy_docs.outputs.url) }}
        ${{ needs.deploy_playground.outputs.url && format('[developer playground]({0}) ', needs.deploy_playground.outputs.url) }}
    steps:
      - name: Add preview URL to job summary
        run: |
          echo "${{ env.MESSAGE }}" >> $GITHUB_STEP_SUMMARY
      - name: Failing deploy
        if: ${{ env.STATUS == 'failed' }}
        run: exit 1

  promote_docs:
    name: Oberon CMS Docs
    needs: [test-status, deploy_docs]
    if: inputs.environment == 'production'
    uses: ./.github/workflows/call-promote.yml
    secrets:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    with:
      environment: ${{ inputs.environment }}
      project: oberon-docs
      staging_url: ${{ needs.deploy_docs.outputs.url }}
      production_url: www.oberoncms.com

  promote_playground:
    name: Oberon Playground
    needs: [test-status, deploy_playground]
    if: inputs.environment == 'production'
    uses: ./.github/workflows/call-promote.yml
    secrets:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    with:
      environment: ${{ inputs.environment }}
      project: playground
      staging_url: ${{ needs.deploy_playground.outputs.url }}
      production_url: playground.tohuhono.com

  smoke-docs-production:
    name: Smoke Test Promoted Docs
    needs: [promote_docs]
    if: inputs.environment == 'production'
    uses: ./.github/workflows/call-smoke.yml
    with:
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      project: docs
      base_url: https://www.oberoncms.com
    secrets:
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}

  smoke-playground-production:
    name: Smoke Test Promoted Playground
    needs: [promote_playground]
    if: inputs.environment == 'production'
    uses: ./.github/workflows/call-smoke.yml
    with:
      repository: ${{ inputs.repository }}
      ref: ${{ inputs.ref }}
      project: playground
      base_url: https://playground.tohuhono.com
    secrets:
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
